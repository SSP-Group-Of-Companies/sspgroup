<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#111}
.label{font-weight:bold}
</style>

<!-- Trailer -->
<rect x="120" y="140" width="520" height="110" fill="white" stroke="black" stroke-width="3"></rect>
<rect x="640" y="170" width="120" height="80" fill="white" stroke="black" stroke-width="3"></rect>

<!-- Cab -->
<rect x="720" y="180" width="80" height="70" fill="white" stroke="black" stroke-width="3"></rect>

<!-- Wheels -->
<circle cx="220" cy="260" r="22" fill="white" stroke="black" stroke-width="3"></circle>
<circle cx="270" cy="260" r="22" fill="white" stroke="black" stroke-width="3"></circle>

<circle cx="680" cy="260" r="22" fill="white" stroke="black" stroke-width="3"></circle>
<circle cx="730" cy="260" r="22" fill="white" stroke="black" stroke-width="3"></circle>

<!-- Length Arrow -->
<line x1="120" y1="120" x2="640" y2="120" stroke="black" stroke-width="2"></line>
<polygon points="120,120 130,115 130,125" fill="black"></polygon>
<polygon points="640,120 630,115 630,125" fill="black"></polygon>
<text x="360" y="105" text-anchor="middle" class="label">53 ft Trailer Length</text>

<!-- Height Arrow -->
<line x1="80" y1="140" x2="80" y2="250" stroke="black" stroke-width="2"></line>
<polygon points="80,140 75,150 85,150" fill="black"></polygon>
<polygon points="80,250 75,240 85,240" fill="black"></polygon>
<text x="40" y="200" transform="rotate(-90 40,200)" class="label">Interior Height ~9 ft</text>

<!-- Width Arrow -->
<line x1="350" y1="300" x2="470" y2="300" stroke="black" stroke-width="2"></line>
<polygon points="350,300 360,295 360,305" fill="black"></polygon>
<polygon points="470,300 460,295 460,305" fill="black"></polygon>
<text x="410" y="325" text-anchor="middle" class="label">Width 8.5 ft (102")</text>

<!-- Weight -->
<text x="660" y="80" class="label">Max Freight Weight</text>
<text x="660" y="100">≈ 45,000 lbs</text>
</svg>
